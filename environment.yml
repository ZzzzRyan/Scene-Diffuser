name: scene-diffuser
channels:
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip=25.1
  - setuptools>=75
  - wheel
  - ninja
  - cmake
  - make
  - pkg-config
  - git
  - gcc_linux-64=13
  - gxx_linux-64=13
  - cuda-nvcc=12.8
  - cuda-cudart-dev=12.8
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - torch==2.11.0+cu128
      - torchvision==0.26.0+cu128
